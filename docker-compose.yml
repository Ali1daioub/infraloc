services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: infraloc
      POSTGRES_PASSWORD: infraloc
      POSTGRES_DB: infraloc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infraloc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://infraloc:infraloc@db:5432/infraloc
      DATABASE_URL_SYNC: postgresql+psycopg2://infraloc:infraloc@db:5432/infraloc
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: '["http://localhost:3000","https://infraloc.vercel.app"]'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
